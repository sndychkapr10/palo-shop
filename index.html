<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=yes">
<title>PALO — магазин одежды</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial,sans-serif;background:linear-gradient(135deg,#e3f2fd 0%,#bbdef5 100%);min-height:100vh}
.app{display:flex;min-height:100vh}.sidebar{width:280px;background:rgba(255,255,255,.96);border-right:1px solid #e2e8f0;padding:2rem 1.5rem;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;gap:2rem;flex-shrink:0}
.logo{font-size:26px;font-weight:700;cursor:pointer;color:#0f1722}.logo span{font-weight:300;color:#5b6e8c}
.nav-links{display:flex;flex-direction:column;gap:1.2rem}.nav-links a{cursor:pointer;font-weight:500;color:#2c3e50;padding:.6rem 0;display:flex;align-items:center;gap:12px;font-size:16px}
.cart-badge{background:#1e2f3f;color:#fff;border-radius:40px;padding:.2rem .65rem;font-size:.7rem;margin-left:auto}
.admin-link-hidden{margin-top:auto;font-size:.85rem;opacity:0;cursor:pointer;transition:opacity .3s;text-align:center;padding:.5rem;border-radius:20px;background:rgba(0,0,0,.05)}
.admin-link-hidden.visible{opacity:.7}
.main-content{flex:1;padding:2rem}.section-title{font-size:28px;font-weight:600;margin-bottom:24px;color:#0f1722}
.products-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:24px}
.product-card{background:#fff;border-radius:24px;padding:20px;text-align:center;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.05);transition:.3s;border:1px solid rgba(255,255,255,.5)}
.product-card:hover{transform:translateY(-6px);box-shadow:0 12px 32px rgba(0,0,0,.1)}
.product-image{width:100%;aspect-ratio:4/3;border-radius:16px;overflow:hidden;margin-bottom:12px;background:#f0f2f5;display:flex;align-items:center;justify-content:center}
.product-image img{width:100%;height:100%;object-fit:contain}
.product-image .no-image{font-size:56px}
.product-name{font-weight:700;font-size:18px;margin:8px 0}
.product-price{color:#e67e22;font-weight:700;font-size:20px;margin:4px 0}
.product-desc{font-size:13px;color:#6b7f94;margin:8px 0}
.btn{background:#1e2f3f;color:#fff;border:none;padding:10px;border-radius:40px;cursor:pointer;font-size:14px;font-weight:600;width:100%;margin-top:10px}
.btn:hover{background:#2c4054}
.btn-outline{background:transparent;border:2px solid #e2e8f0;color:#1e2f3f}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:1000;justify-content:center;align-items:center;padding:20px;overflow-y:auto}
.modal-content{background:#fff;border-radius:32px;max-width:500px;width:100%;padding:24px;position:relative;max-height:95vh;overflow-y:auto}
.close-modal{position:absolute;top:16px;right:20px;font-size:28px;cursor:pointer;z-index:10;background:rgba(255,255,255,.9);width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.gallery{position:relative;width:100%;overflow:hidden;border-radius:16px;background:#f0f2f5}
.gallery .slides{display:flex;transition:transform .3s ease}
.gallery .slide{min-width:100%;display:flex;justify-content:center;align-items:center;height:300px;position:relative;cursor:pointer}
.gallery .slide img{width:100%;height:100%;object-fit:contain}
.gallery .slide .empty{font-size:64px;color:#999}
.gallery .arrow{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.5);color:#fff;border:none;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:18px;z-index:5}
.gallery .arrow:hover{background:rgba(0,0,0,.8)}
.gallery .prev{left:8px}.gallery .next{right:8px}
.gallery .dots{display:flex;justify-content:center;gap:8px;margin-top:8px}
.gallery .dot{width:8px;height:8px;border-radius:50%;background:#ccc;cursor:pointer;border:none;padding:0}
.gallery .dot.active{background:#1e2f3f}
.zoom-hint{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.5);color:#fff;padding:2px 10px;border-radius:12px;font-size:10px;z-index:3;pointer-events:none}
.zoom-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.95);z-index:2000;justify-content:center;align-items:center;cursor:zoom-out;padding:20px}
.zoom-overlay.active{display:flex}
.zoom-overlay img{max-width:95%;max-height:95%;object-fit:contain;border-radius:8px}
.zoom-overlay .close-zoom{position:absolute;top:20px;right:30px;font-size:40px;color:#fff;cursor:pointer;z-index:2001}
.size-section{margin:15px 0;padding:12px;background:#f5f7fa;border-radius:16px}
.size-section .label{font-weight:600;font-size:14px;display:block;margin-bottom:8px}
.size-buttons{display:flex;gap:10px;flex-wrap:wrap}
.size-btn{background:#fff;border:2px solid #e2e8f0;padding:8px 20px;border-radius:30px;cursor:pointer;font-weight:500;font-size:14px}
.size-btn:hover{border-color:#1e2f3f}
.size-btn.selected{background:#1e2f3f;color:#fff;border-color:#1e2f3f}
.size-info{font-size:13px;color:#6b7f94;margin-top:10px}
.cart-item{background:#fff;padding:16px 20px;border-radius:18px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.cart-item .info{flex:1;min-width:120px}
.cart-item .name{font-weight:600}
.cart-item .size{font-size:13px;color:#6b7f94}
.total-block{font-size:24px;font-weight:700;text-align:right;margin-top:20px;padding-top:16px;border-top:2px solid #e2e8f0}
.empty-cart{text-align:center;padding:60px 20px;color:#6b7f94}
.payment-card{background:#e8f5e9;border-radius:18px;padding:16px;text-align:center;margin:16px 0}
.payment-card .card-number{font-size:20px;font-weight:700;letter-spacing:2px;margin:8px 0;color:#1a2332}
input,select,textarea{width:100%;padding:12px 16px;border:2px solid #e2e8f0;border-radius:16px;font-size:16px;font-family:inherit;margin-bottom:12px}
input:focus,select:focus,textarea:focus{outline:none;border-color:#1e2f3f}
.admin-panel{background:#fff;border-radius:24px;padding:24px}
.photo-upload-area{background:#f5f7fa;padding:15px;border-radius:16px;margin:10px 0}
.photo-preview{width:100px;height:100px;background:#e8ecf1;border-radius:14px;margin:10px 0;display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:pointer}
.photo-preview img{width:100%;height:100%;object-fit:cover}
.photo-preview .empty{font-size:32px;color:#999}
.photo-url-input{width:100%;padding:8px 12px;border:2px solid #e2e8f0;border-radius:12px;font-size:14px;margin-top:6px}
.photo-url-input:focus{outline:none;border-color:#1e2f3f}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1a2332;color:#fff;padding:12px 28px;border-radius:40px;font-size:15px;font-weight:500;opacity:0;transition:.4s;z-index:3000;box-shadow:0 8px 32px rgba(0,0,0,.2);pointer-events:none}
.toast.show{opacity:1}
@media(max-width:768px){.sidebar{width:80px;padding:1rem .5rem}.sidebar .logo{font-size:18px;text-align:center}.nav-links a span:not(.cart-badge){display:none}.nav-links a{justify-content:center;font-size:20px}.main-content{padding:1rem}.products-grid{gap:12px}.product-card{padding:14px}.gallery .slide{height:250px}.modal-content{padding:16px}}
</style>
</head>
<body>
<div class="app">
<aside class="sidebar">
<div class="logo" onclick="navigate('home')">PALO<span>.</span></div>
<div class="nav-links">
<a onclick="navigate('home')">🏠 <span>Магазин</span></a>
<a onclick="navigate('cart')">🛒 <span>Корзина</span> <span class="cart-badge" id="cartCount">0</span></a>
</div>
<div id="adminSecretLink" class="admin-link-hidden" onclick="showAdminAuth()">🔒 <span>Админ</span></div>
</aside>
<main class="main-content" id="app"></main>
</div>
<div id="toast" class="toast"></div>
<div class="zoom-overlay" id="zoomOverlay" onclick="closeZoom()">
<span class="close-zoom">&times;</span>
<img id="zoomImage" src="">
</div>
<script>const products = [
    {
        id: 1,
        name: "Кепка",
        price: 1500,
        desc: "Хлопок, козырёк",
        emoji: "🧢",
        sizes: ["S","M","L"],
        measures: ["54-56 см","57-59 см","60-62 см"],
        frontImg: "",
        sideImg: "",
        mannequinImg: ""
    },
    {
        id: 2,
        name: "Футболка",
        price: 1550,
        desc: "Джерси, белый",
        emoji: "👕",
        sizes: ["S","M","L","XL"],
        measures: ["68/48 см","70/51 см","72/54 см","74/57 см"],
        frontImg: "https://i.yapx.ru/d2iqR.jpg",
        sideImg: "https://i.yapx.ru/d2irY.jpg",
        mannequinImg: "https://i.yapx.ru/d2iu7.jpg"
    },
    {
        id: 3,
        name: "Брюки",
        price: 4550,
        desc: "flared, синий",
        emoji: "👖",
        sizes: ["S","M","L","XL"],
        measures: ["100/72 см","102/76 см","104/80 см","106/84 см"],
        frontImg: "https://i.yapx.ru/d2iw7.jpg",
        sideImg: "https://i.yapx.ru/d2iyP.jpg",
        mannequinImg: "https://i.yapx.ru/d2iy1.jpg"
    },
    {
        id: 4,
        name: "Лонгслив",
        price: 1850,
        desc: "Трикотаж, чёрный",
        emoji: "🧥",
        sizes: ["S","M","L","XL"],
        measures: ["62/48 см","64/51 см","66/54 см","68/57 см"],
        frontImg: "https://i.yapx.ru/d2i0q.jpg",
        sideImg: "https://i.yapx.ru/d2i01.jpg",
        mannequinImg: "https://i.yapx.ru/d2i1B.jpg"
    }
];
let cart = JSON.parse(localStorage.getItem('cart') || '[]');
let sizes = JSON.parse(localStorage.getItem('sizes') || '{}');
let isAdmin = false;
let editId = null;
let clicks = 0;
let tmr = null;
let gIdx = 0;
let gImgs = [];

function saveCart() {
    localStorage.setItem('cart', JSON.stringify(cart));
    document.getElementById('cartCount').innerText = cart.reduce((a,b) => a + b.qty, 0);
}

function toast(m) {
    let t = document.getElementById('toast');
    t.innerText = m;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
}

function loadSaved() {
    let s = localStorage.getItem('palo_products');
    if (s) {
        try {
            let p = JSON.parse(s);
            if (p && p.length) {
                for (let i = 0; i < p.length; i++) {
                    if (products[i]) {
                        products[i].frontImg = p[i].frontImg || '';
                        products[i].sideImg = p[i].sideImg || '';
                        products[i].mannequinImg = p[i].mannequinImg || '';
                    }
                }
            }
        } catch (e) {}
    }
}

function saveAll() {
    localStorage.setItem('palo_products', JSON.stringify(products));
}

function openM(id) {
    document.getElementById(id).style.display = 'flex';
    document.body.style.overflow = 'hidden';
}

function closeM(id) {
    document.getElementById(id).style.display = 'none';
    document.body.style.overflow = '';
}

function openZoom(s) {
    if (!s) return;
    document.getElementById('zoomImage').src = s;
    document.getElementById('zoomOverlay').classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeZoom() {
    document.getElementById('zoomOverlay').classList.remove('active');
    document.body.style.overflow = '';
}

document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeZoom();
});

function selSize(id, size, idx) {
    sizes[id] = size;
    localStorage.setItem('sizes', JSON.stringify(sizes));
    document.querySelectorAll('.size-' + id).forEach(function(b) {
        if (b.innerText === size) b.classList.add('selected');
        else b.classList.remove('selected');
    });
    let p = products.find(function(x) { return x.id === id; });
    if (p) document.getElementById('sizeInfo-' + id).innerText = p.measures[idx];
}

function addCart(id) {
    let p = products.find(function(x) { return x.id === id; });
    let sz = sizes[id];
    if (p.sizes && !sz) { toast('⚠️ Выберите размер!'); return; }
    let it = cart.find(function(i) { return i.id === id && i.size === sz; });
    if (it) it.qty++;
    else cart.push({id: id, qty: 1, size: sz || 'OS'});
    saveCart();
    toast('✓ Добавлено');
    navigate('cart');
}

function remCart(id, sz) {
    cart = cart.filter(function(i) { return !(i.id === id && i.size === sz); });
    saveCart();
    navigate('cart');
}

function sendOrd(d, t, c) {
    const T = '8758635199:AAEG8B69jBqbW1fmwLZUbrso5w1VIrHonKg';
    const CH = '5820655432';
    let txt = '🛍️ НОВЫЙ ЗАКАЗ PALO\n\n👤 ' + c.name + '\n📞 ' + c.phone + '\n📍 ' + c.address + '\n🚚 ' + c.delivery + '\n\n📦 ' + d + '\n💰 ' + t + ' ₽\n💳 Карта: 2200 7020 0430 8479';
    fetch('https://api.telegram.org/bot' + T + '/sendMessage', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({chat_id: CH, text: txt})
    }).then(function(r) { return r.json(); }).then(function(d) {
        if (d.ok) {
            toast('✅ Заказ отправлен!');
            cart = [];
            saveCart();
            closeM('orderModal');
            navigate('home');
        } else toast('❌ Ошибка');
    }).catch(function() { toast('❌ Ошибка'); });
}

function makeGallery(imgs) {
    var h = '';
    imgs.forEach(function(img) {
        h += '<div class="slide" onclick="openZoom(\'' + (img || '') + '\')">' + (img ? '<img src="' + img + '">' : '<span class="empty">📸</span>') + '</div>';
    });
    return '<div class="gallery"><div class="slides" id="gSlides">' + h + '</div>' + (imgs.length > 1 ? '<button class="arrow prev" onclick="slideG(-1)">‹</button><button class="arrow next" onclick="slideG(1)">›</button><div class="dots" id="gDots"></div>' : '') + '<div class="zoom-hint">🔍 Нажмите для увеличения</div></div>';
}

function slideG(d) {
    var s = document.getElementById('gSlides');
    if (!s) return;
    var t = gImgs.length;
    if (t <= 1) return;
    gIdx = (gIdx + d + t) % t;
    s.style.transform = 'translateX(-' + (gIdx * 100) + '%)';
    document.querySelectorAll('#gDots .dot').forEach(function(dot, i) {
        if (i === gIdx) dot.classList.add('active');
        else dot.classList.remove('active');
    });
}

function openProd(id) {
    var p = products.find(function(pr) { return pr.id === id; });
    var cur = sizes[id] || '';
    var imgs = [];
    if (p.frontImg) imgs.push(p.frontImg);
    if (p.sideImg) imgs.push(p.sideImg);
    if (p.mannequinImg) imgs.push(p.mannequinImg);
    if (imgs.length === 0) imgs.push(null);
    gImgs = imgs;
    gIdx = 0;
    var szH = '';
    if (p.sizes) {
        szH = '<div class="size-section"><span class="label">📏 Выберите размер:</span><div class="size-buttons">';
        p.sizes.forEach(function(s, i) {
            szH += '<button class="size-btn size-' + p.id + (cur === s ? ' selected' : '') + '" onclick="selSize(' + p.id + ',\'' + s + '\',' + i + ')">' + s + '</button>';
        });
        szH += '</div><div class="size-info" id="sizeInfo-' + p.id + '">' + (cur ? p.measures[p.sizes.indexOf(cur)] : 'Нажмите на размер для замеров') + '</div></div>';
    }
    document.getElementById('productModalContent').innerHTML = '<span class="close-modal" onclick="closeM(\'productModal\')">&times;</span>' + makeGallery(imgs) + '<div style="text-align:center;margin-top:12px;"><h2>' + p.name + '</h2><div style="font-size:24px;font-weight:700;color:#e67e22;margin:6px 0;">' + p.price + ' ₽</div><div style="color:#6b7f94;font-size:14px;">' + p.desc + '</div>' + szH + '<button class="btn" onclick="addCart(' + p.id + ');closeM(\'productModal\');">🛒 Добавить в корзину</button></div>';
    openM('productModal');
    setTimeout(function() {
        var d = document.getElementById('gDots');
        if (d && imgs.length > 1) {
            d.innerHTML = '';
            imgs.forEach(function(_, i) {
                var dot = document.createElement('button');
                dot.className = 'dot' + (i === 0 ? ' active' : '');
                dot.onclick = function() {
                    gIdx = i;
                    var s = document.getElementById('gSlides');
                    if (s) s.style.transform = 'translateX(-' + (i * 100) + '%)';
                    document.querySelectorAll('#gDots .dot').forEach(function(d, j) {
                        if (j === i) d.classList.add('active');
                        else d.classList.remove('active');
                    });
                };
                d.appendChild(dot);
            });
        }
        var s = document.getElementById('gSlides');
        if (s) s.style.transform = 'translateX(0%)';
    }, 50);
}

function openOrder() {
    if (cart.length === 0) { toast('Корзина пуста'); return; }
    openM('orderModal');
}

function closeOrder() { closeM('orderModal'); }

function submitOrd() {
    var n = document.getElementById('orderName').value.trim();
    var p = document.getElementById('orderPhone').value.trim();
    var a = document.getElementById('orderAddress').value.trim();
    var d = document.getElementById('orderDelivery').value;
    if (!n || !p || !a) { toast('Заполните все поля'); return; }
    var lines = '';
    var total = 0;
    cart.forEach(function(i) {
        var pr = products.find(function(x) { return x.id === i.id; });
        if (pr) {
            var s = pr.price * i.qty;
            total += s;
            lines += '• ' + pr.name + ' (' + (i.size || 'OS') + ') — ' + i.qty + 'шт × ' + pr.price + '₽ = ' + s + '₽\n';
        }
    });
    sendOrd(lines, total, {name: n, phone: p, address: a, delivery: d});
    closeOrder();
}

function renderHome() {
    var h = '<div class="section-title">Коллекция</div><div class="products-grid">';
    products.forEach(function(p) {
        var img = p.frontImg ? '<img src="' + p.frontImg + '">' : '<span class="no-image">' + p.emoji + '</span>';
        h += '<div class="product-card" onclick="openProd(' + p.id + ')"><div class="product-image">' + img + '</div><div class="product-name">' + p.name + '</div><div class="product-price">' + p.price + ' ₽</div><div class="product-desc">' + p.desc + '</div><button class="btn" onclick="event.stopPropagation();openProd(' + p.id + ')">🔍 Выбрать размер</button></div>';
    });
    h += '</div>';
    document.getElementById('app').innerHTML = h;
}

function renderCart() {
    if (cart.length === 0) {
        document.getElementById('app').innerHTML = '<div class="section-title">Корзина</div><div class="empty-cart"><span class="icon">🛒</span><h3>Корзина пуста</h3></div>';
        return;
    }
    var total = 0;
    var h = '<div class="section-title">Корзина</div>';
    cart.forEach(function(i) {
        var p = products.find(function(pr) { return pr.id === i.id; });
        if (!p) return;
        var s = p.price * i.qty;
        total += s;
        h += '<div class="cart-item"><div class="info"><div class="name">' + p.name + '</div><div class="size">' + (i.size || 'OS') + '</div><div>' + i.qty + ' шт × ' + p.price + ' ₽</div></div><div><strong>' + s + ' ₽</strong></div><button class="btn-outline" style="width:auto;padding:6px 16px;margin:0;" onclick="remCart(' + p.id + ',\'' + (i.size || '') + '\')">🗑</button></div>';
    });
    h += '<div class="total-block">Итого: ' + total + ' ₽</div><button class="btn" style="max-width:280px;margin-top:16px;" onclick="openOrder()">💳 Оформить заказ</button>';
    document.getElementById('app').innerHTML = h;
}

function renderAdmin() {
    if (!isAdmin) {
        document.getElementById('app').innerHTML = '<div style="text-align:center;padding:50px;"><h3>🔒 Доступ закрыт</h3><p>Нажмите 5 раз на логотип PALO → появится ссылка "Админ" → пароль admin123</p></div>';
        return;
    }
    var h = '<div class="admin-panel"><h2>📷 Управление товарами</h2><div id="adminMsg"></div><div id="adminForm"></div><h3 style="margin:20px 0 10px;">Список товаров</h3>';
    products.forEach(function(p) {
        h += '<div class="product-row"><span>' + (p.frontImg ? '📷' : '📸') + ' <strong>' + p.name + '</strong> — ' + p.price + '₽</span><button onclick="editProd(' + p.id + ')" class="btn-outline" style="padding:5px 15px;width:auto;">✏️</button></div>';
    });
    h += '</div>';
    document.getElementById('app').innerHTML = h;
    if (editId) {
        var p = products.find(function(x) { return x.id === editId; });
        if (p) renderForm(p);
    } else renderForm(null);
}

function editProd(id) { editId = id; renderAdmin(); }

function cancelEdit() { editId = null; renderAdmin(); }

function handleImg(ev, fid, pid) {
    var f = ev.target.files[0];
    if (!f) return;
    if (f.size > 5 * 1024 * 1024) { toast('⚠️ Файл >5 МБ'); return; }
    var r = new FileReader();
    r.onload = function(e) {
        document.getElementById(fid).value = e.target.result;
        document.getElementById(pid).innerHTML = '<img src="' + e.target.result + '" style="width:100%;height:100%;object-fit:cover;">';
        toast('✅ Фото загружено! Нажмите "Сохранить"');
    };
    r.readAsDataURL(f);
}

function setImageByUrl(type) {
    var url = '';
    if (type === 'front') url = document.getElementById('frontUrlInput').value.trim();
    if (type === 'side') url = document.getElementById('sideUrlInput').value.trim();
    if (type === 'mannequin') url = document.getElementById('manUrlInput').value.trim();
    if (!url) { toast('Введите ссылку на фото'); return; }
    if (type === 'front') {
        document.getElementById('frontVal').value = url;
        document.getElementById('frontPreview').innerHTML = '<img src="' + url + '" style="width:100%;height:100%;object-fit:cover;">';
        toast('✅ Фото по ссылке добавлено');
    }
    if (type === 'side') {
        document.getElementById('sideVal').value = url;
        document.getElementById('sidePreview').innerHTML = '<img src="' + url + '" style="width:100%;height:100%;object-fit:cover;">';
        toast('✅ Фото по ссылке добавлено');
    }
    if (type === 'mannequin') {
        document.getElementById('manVal').value = url;
        document.getElementById('manPreview').innerHTML = '<img src="' + url + '" style="width:100%;height:100%;object-fit:cover;">';
        toast('✅ Фото по ссылке добавлено');
    }
}

function saveProd() {
    var n = document.getElementById('prodName').value.trim();
    var p = parseInt(document.getElementById('prodPrice').value);
    var d = document.getElementById('prodDesc').value;
    var e = document.getElementById('prodEmoji').value;
    var f = document.getElementById('frontVal').value;
    var s = document.getElementById('sideVal').value;
    var m = document.getElementById('manVal').value;
    if (!n || isNaN(p)) { toast('Заполните название и цену'); return; }
    if (editId) {
        var idx = products.findIndex(function(x) { return x.id === editId; });
        if (idx !== -1) {
            products[idx].name = n;
            products[idx].price = p;
            products[idx].desc = d;
            products[idx].emoji = e;
            products[idx].frontImg = f;
            products[idx].sideImg = s;
            products[idx].mannequinImg = m;
        }
    }
    saveAll();
    var msg = document.getElementById('adminMsg');
    if (msg) {
        msg.innerHTML = '<div style="background:#e0f2e9;padding:10px;border-radius:12px;">✓ Сохранено</div>';
        setTimeout(function() { msg.innerHTML = ''; }, 3000);
    }
    toast('✅ Товар сохранён');
    editId = null;
    renderAdmin();
}function renderForm(prod) {
    var f = document.getElementById('adminForm');
    if (!f) return;
    var p = prod || {id: null, name: '', price: '', desc: '', emoji: '👕', frontImg: '', sideImg: '', mannequinImg: ''};
    f.innerHTML = '<div style="margin-top:20px;border-top:2px solid #eee;padding-top:20px;"><h3>' + (p.id ? 'Редактировать' : 'Новый товар') + '</h3><div><input id="prodName" placeholder="Название" value="' + p.name + '" style="width:100%;padding:10px;border-radius:12px;border:1px solid #ddd;margin-bottom:10px;"></div><div><input id="prodPrice" type="number" placeholder="Цена" value="' + p.price + '" style="width:100%;padding:10px;border-radius:12px;border:1px solid #ddd;margin-bottom:10px;"></div><div><textarea id="prodDesc" rows="2" placeholder="Описание" style="width:100%;padding:10px;border-radius:12px;border:1px solid #ddd;margin-bottom:10px;">' + p.desc + '</textarea></div><div><input id="prodEmoji" placeholder="Эмодзи" value="' + p.emoji + '" style="width:100%;padding:10px;border-radius:12px;border:1px solid #ddd;margin-bottom:10px;"></div><div class="photo-upload-area"><div><strong>📷 Фото 1 (спереди)</strong></div><div class="photo-preview" id="frontPreview" onclick="document.getElementById(\'frontFile\').click()">' + (p.frontImg ? '<img src="' + p.frontImg + '">' : '<span class="empty">📸</span>') + '</div><input type="file" id="frontFile" style="display:none" accept="image/*" onchange="handleImg(event,\'frontVal\',\'frontPreview\')"><input class="photo-url-input" id="frontUrlInput" placeholder="Или вставьте ссылку на фото" value="' + (p.frontImg || '') + '"><button class="btn-outline" style="width:auto;padding:5px 15px;margin-top:4px;" onclick="setImageByUrl(\'front\')">🔗 Применить ссылку</button><input type="hidden" id="frontVal" value="' + (p.frontImg || '') + '"></div><div class="photo-upload-area"><div><strong>📷 Фото 2 (сбоку)</strong></div><div class="photo-preview" id="sidePreview" onclick="document.getElementById(\'sideFile\').click()">' + (p.sideImg ? '<img src="' + p.sideImg + '">' : '<span class="empty">📸</span>') + '</div><input type="file" id="sideFile" style="display:none" accept="image/*" onchange="handleImg(event,\'sideVal\',\'sidePreview\')"><input class="photo-url-input" id="sideUrlInput" placeholder="Или вставьте ссылку на фото" value="' + (p.sideImg || '') + '"><button class="btn-outline" style="width:auto;padding:5px 15px;margin-top:4px;" onclick="setImageByUrl(\'side\')">🔗 Применить ссылку</button><input type="hidden" id="sideVal" value="' + (p.sideImg || '') + '"></div><div class="photo-upload-area"><div><strong>📷 Фото 3 (на манекене)</strong></div><div class="photo-preview" id="manPreview" onclick="document.getElementById(\'manFile\').click()">' + (p.mannequinImg ? '<img src="' + p.mannequinImg + '">' : '<span class="empty">🕴️</span>') + '</div><input type="file" id="manFile" style="display:none" accept="image/*" onchange="handleImg(event,\'manVal\',\'manPreview\')"><input class="photo-url-input" id="manUrlInput" placeholder="Или вставьте ссылку на фото" value="' + (p.mannequinImg || '') + '"><button class="btn-outline" style="width:auto;padding:5px 15px;margin-top:4px;" onclick="setImageByUrl(\'mannequin\')">🔗 Применить ссылку</button><input type="hidden" id="manVal" value="' + (p.mannequinImg || '') + '"></div><button class="btn" onclick="saveProd()">💾 Сохранить</button><button class="btn-outline" style="margin-left:10px;" onclick="cancelEdit()">Отмена</button></div>';
}

function navigate(p) {
    if (p === 'home') renderHome();
    else if (p === 'cart') renderCart();
    window.scrollTo(0, 0);
}

document.querySelector('.logo').addEventListener('click', function() {
    clicks++;
    clearTimeout(tmr);
    tmr = setTimeout(function() { clicks = 0; }, 1000);
    if (clicks >= 5) {
        clicks = 0;
        localStorage.setItem('adminShown', 'true');
        document.getElementById('adminSecretLink').classList.add('visible');
        toast('🔓 Админ-панель активирована');
    }
});

function showAdminAuth() {
    if (isAdmin) { renderAdmin(); return; }
    openM('adminAuthModal');
}

function closeAdminAuth() {
    closeM('adminAuthModal');
    document.getElementById('adminPassword').value = '';
}

function checkAdmin() {
    var p = document.getElementById('adminPassword').value;
    if (p === 'admin123') {
        isAdmin = true;
        closeAdminAuth();
        toast('✅ Добро пожаловать в админку');
        renderAdmin();
    } else toast('❌ Неверный пароль');
}

loadSaved();
saveCart();
renderHome();
</script>
