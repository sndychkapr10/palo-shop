<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PALO — магазин одежды</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 20px; }
        .header { background: white; padding: 15px 20px; display: flex; justify-content: space-between; border-radius: 12px; margin-bottom: 20px; }
        .logo { font-size: 24px; font-weight: bold; cursor: pointer; }
        .nav a { margin-left: 20px; cursor: pointer; color: #333; text-decoration: none; }
        .cart-count { background: #333; color: white; border-radius: 50%; padding: 2px 8px; font-size: 12px; margin-left: 5px; }
        .products { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .product { background: white; border-radius: 16px; padding: 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .product-emoji { font-size: 64px; }
        .product-name { font-weight: bold; margin: 10px 0; }
        .product-price { color: #e67e22; font-weight: bold; font-size: 20px; }
        .btn { background: #333; color: white; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; width: 100%; margin-top: 10px; font-size: 14px; }
        .cart-item { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .total { font-size: 24px; font-weight: bold; text-align: right; margin-top: 20px; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 30px; opacity: 0; transition: 0.3s; z-index: 1000; }
        .toast.show { opacity: 1; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; border-radius: 24px; max-width: 400px; width: 90%; padding: 20px; position: relative; }
        .close { position: absolute; top: 10px; right: 20px; font-size: 28px; cursor: pointer; }
        .size-buttons { display: flex; gap: 10px; justify-content: center; margin: 15px 0; flex-wrap: wrap; }
        .size-btn { background: #eee; border: none; padding: 8px 20px; border-radius: 30px; cursor: pointer; }
        .size-btn.selected { background: #333; color: white; }
        .size-info { font-size: 12px; color: #666; text-align: center; margin: 10px 0; }
        input, select, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 12px; font-family: inherit; }
        .payment-info { background: #e8f5e9; padding: 15px; border-radius: 16px; text-align: center; margin: 15px 0; }
        .card-number { font-size: 18px; font-weight: bold; letter-spacing: 2px; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo" onclick="navigate('home')">PALO</div>
        <div class="nav">
            <a onclick="navigate('home')">Магазин</a>
            <a onclick="navigate('cart')">Корзина <span class="cart-count" id="cartCount">0</span></a>
        </div>
    </div>
    <div class="products" id="app"></div>
    <div id="toast" class="toast"></div>

    <script>
        // Товары
        const products = [
            { id: 1, name: "Кепка", price: 1500, emoji: "🧢", desc: "Хлопковая" },
            { id: 2, name: "Футболка", price: 1900, emoji: "👕", desc: "Белая" },
            { id: 3, name: "Брюки", price: 5200, emoji: "👖", desc: "Широкие" },
            { id: 4, name: "Лонгслив", price: 2700, emoji: "🧥", desc: "Чёрный" }
        ];
        
        // Размеры
        const sizes = {
            1: { list: ["S", "M", "L"], info: ["54-56 см", "57-59 см", "60-62 см"] },
            2: { list: ["S", "M", "L", "XL"], info: ["68 см/48 см", "70 см/51 см", "72 см/54 см", "74 см/57 см"] },
            3: { list: ["S", "M", "L", "XL"], info: ["100 см/72 см", "102 см/76 см", "104 см/80 см", "106 см/84 см"] },
            4: { list: ["S", "M", "L", "XL"], info: ["62 см/48 см", "64 см/51 см", "66 см/54 см", "68 см/57 см"] }
        };
        
        let cart = JSON.parse(localStorage.getItem('cart') || '[]');
        let selectedSizes = JSON.parse(localStorage.getItem('selectedSizes') || '{}');
        
        function saveCart() {
            localStorage.setItem('cart', JSON.stringify(cart));
            document.getElementById('cartCount').innerText = cart.reduce((s,i) => s + i.qty, 0);
        }
        
        function showToast(msg) {
            let t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }
        
        function addToCart(id) {
            let size = selectedSizes[id];
            if (sizes[id] && !size) {
                showToast('Сначала выберите размер!');
                return;
            }
            let item = cart.find(i => i.id === id && i.size === size);
            if (item) item.qty++;
            else cart.push({ id, qty: 1, size: size || 'OS' });
            saveCart();
            showToast('✓ Добавлено в корзину');
            navigate('cart');
        }
        
        function removeFromCart(id, size) {
            cart = cart.filter(i => !(i.id === id && i.size === size));
            saveCart();
            navigate('cart');
        }
        
        function selectSize(productId, size, index) {
            selectedSizes[productId] = size;
            localStorage.setItem('selectedSizes', JSON.stringify(selectedSizes));
            document.querySelectorAll(`.size-${productId}`).forEach((btn, i) => {
                if (btn.innerText === size) btn.classList.add('selected');
                else btn.classList.remove('selected');
            });
            document.getElementById(`sizeInfo-${productId}`).innerHTML = sizes[productId].info[index];
        }
        
        function openModal(productId) {
            let p = products.find(x => x.id === productId);
            let s = sizes[productId];
            let currentSize = selectedSizes[productId] || '';
            let sizeHtml = '';
            if (s) {
                sizeHtml = `<div class="size-buttons">`;
                s.list.forEach((size, idx) => {
                    sizeHtml += `<button class="size-btn size-${productId} ${currentSize === size ? 'selected' : ''}" onclick="selectSize(${productId}, '${size}', ${idx})">${size}</button>`;
                });
                sizeHtml += `</div><div class="size-info" id="sizeInfo-${productId}">${currentSize ? s.info[s.list.indexOf(currentSize)] : 'Нажмите на размер'}</div>`;
            }
            document.getElementById('modalBody').innerHTML = `
                <span class="close" onclick="closeModal()">&times;</span>
                <h2>${p.name}</h2>
                <div style="font-size:32px; text-align:center; margin:10px 0;">${p.emoji}</div>
                <div class="product-price" style="text-align:center;">${p.price} ₽</div>
                <div style="text-align:center; margin:10px 0;">${p.desc}</div>
                ${sizeHtml}
                <button class="btn" onclick="addToCart(${productId}); closeModal();">Добавить в корзину</button>
            `;
            document.getElementById('productModal').style.display = 'flex';
        }
        
        function closeModal() {
            document.getElementById('productModal').style.display = 'none';
        }
        
        function openOrderModal() {
            if (cart.length === 0) { showToast('Корзина пуста'); return; }
            document.getElementById('orderModal').style.display = 'flex';
        }
        
        function closeOrderModal() {
            document.getElementById('orderModal').style.display = 'none';
        }
        
        function sendOrder() {
            let name = document.getElementById('orderName').value.trim();
            let phone = document.getElementById('orderPhone').value.trim();
            let address = document.getElementById('orderAddress').value.trim();
            let delivery = document.getElementById('orderDelivery').value;
            if (!name || !phone || !address) { showToast('Заполните все поля'); return; }
            
            let items = '';
            let total = 0;
            cart.forEach(item => {
                let p = products.find(x => x.id === item.id);
                let sum = p.price * item.qty;
                total += sum;
                items += `${p.name} (${item.size || 'OS'}) x${item.qty} = ${sum}₽\n`;
            });
            
            let text = `🛍️ НОВЫЙ ЗАКАЗ PALO\n\n👤 ${name}\n📞 ${phone}\n📍 ${address}\n🚚 ${delivery}\n\n📦 ${items}\n💰 ИТОГО: ${total}₽\n💳 Карта: 2200 7020 0430 8479`;
            
            fetch(`https://api.telegram.org/bot8758635199:AAEG8B69jBqbW1fmwLZUbrso5w1VIrHonKg/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: '5820655432', text: text })
            }).then(r => r.json()).then(d => {
                if (d.ok) {
                    showToast('✅ Заказ отправлен!');
                    cart = [];
                    saveCart();
                    closeOrderModal();
                    navigate('home');
                } else {
                    showToast('❌ Ошибка');
                }
            }).catch(() => showToast('❌ Ошибка соединения'));
        }
        
        function renderHome() {
            let html = '<div class="products">';
            products.forEach(p => {
                html += `
                    <div class="product">
                        <div class="product-emoji">${p.emoji}</div>
                        <div class="product-name">${p.name}</div>
                        <div class="product-price">${p.price} ₽</div>
                        <div style="font-size:12px; margin:5px 0;">${p.desc}</div>
                        <button class="btn" onclick="openModal(${p.id})">Выбрать размер</button>
                    </div>
                `;
            });
            html += '</div>';
            document.getElementById('app').innerHTML = html;
        }
        
        function renderCart() {
            if (cart.length === 0) {
                document.getElementById('app').innerHTML = '<div style="text-align:center; padding:50px;">🛒 Корзина пуста</div>';
                return;
            }
            let total = 0;
            let html = '';
            cart.forEach(item => {
                let p = products.find(x => x.id === item.id);
                let sum = p.price * item.qty;
                total += sum;
                html += `
                    <div class="cart-item">
                        <div><strong>${p.name}</strong> (${item.size || 'OS'}) x${item.qty}</div>
                        <div>${sum} ₽</div>
                        <button class="btn" style="width:auto; background:#999;" onclick="removeFromCart(${p.id}, '${item.size}')">Удалить</button>
                    </div>
                `;
            });
            html += `<div class="total">Итого: ${total} ₽</div>`;
            html += `<button class="btn" onclick="openOrderModal()">💳 Оформить заказ</button>`;
            document.getElementById('app').innerHTML = html;
        }
        
        function navigate(page) {
            if (page === 'home') renderHome();
            else if (page === 'cart') renderCart();
        }
        
        saveCart();
        navigate('home');
        
        window.addToCart = addToCart;
        window.removeFromCart = removeFromCart;
        window.openModal = openModal;
        window.closeModal = closeModal;
        window.selectSize = selectSize;
        window.openOrderModal = openOrderModal;
        window.closeOrderModal = closeOrderModal;
        window.sendOrder = sendOrder;
        window.navigate = navigate;
    </script>

    <!-- Модалка выбора размера -->
    <div id="productModal" class="modal">
        <div class="modal-content" id="modalBody"></div>
    </div>

    <!-- Модалка оформления заказа -->
    <div id="orderModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeOrderModal()">&times;</span>
            <h2>🛍️ Оформление заказа</h2>
            <input type="text" id="orderName" placeholder="Ваше имя">
            <input type="tel" id="orderPhone" placeholder="Телефон">
            <textarea id="orderAddress" rows="2" placeholder="Адрес доставки"></textarea>
            <select id="orderDelivery">
                <option>СДЭК</option>
                <option>Почта России</option>
                <option>Курьером</option>
                <option>Самовывоз</option>
            </select>
            <div class="payment-info">
                <strong>💳 Оплата переводом на карту</strong><br>
                <div class="card-number">2200 7020 0430 8479</div>
                <small>После заказа переведите сумму на карту</small>
            </div>
            <button class="btn" onclick="sendOrder()">✅ Отправить заказ</button>
        </div>
    </div>
</body>
</html>
