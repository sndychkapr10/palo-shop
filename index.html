<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PALO — магазин одежды</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #e3f2fd 0%, #bbdef5 100%); min-height: 100vh; }
        .app { display: flex; min-height: 100vh; }
        
        /* САЙДБАР */
        .sidebar {
            width: 280px;
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(12px);
            border-right: 1px solid #e2e8f0;
            padding: 2rem 1.5rem;
            position: sticky;
            top: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            flex-shrink: 0;
        }
        .logo { font-size: 26px; font-weight: 700; cursor: pointer; color: #0f1722; }
        .logo span { font-weight: 300; color: #5b6e8c; }
        .nav-links { display: flex; flex-direction: column; gap: 1.2rem; }
        .nav-links a { cursor: pointer; font-weight: 500; color: #2c3e50; padding: 0.6rem 0; display: flex; align-items: center; gap: 12px; font-size: 16px; }
        .nav-links a:hover { color: #000; }
        .cart-badge { background: #1e2f3f; color: white; border-radius: 40px; padding: 0.2rem 0.65rem; font-size: 0.7rem; margin-left: auto; }
        .admin-link-hidden {
            margin-top: auto;
            font-size: 0.85rem;
            opacity: 0;
            cursor: pointer;
            transition: opacity 0.3s;
            text-align: center;
            padding: 0.5rem;
            border-radius: 20px;
            background: rgba(0,0,0,0.05);
        }
        .admin-link-hidden.visible { opacity: 0.7; }
        .admin-link-hidden.visible:hover { opacity: 1; background: rgba(0,0,0,0.1); }
        
        .main-content { flex: 1; padding: 2rem; }
        .section-title { font-size: 28px; font-weight: 600; margin-bottom: 24px; color: #0f1722; }
        
        /* ТОВАРЫ 2 В РЯД */
        .products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; }
        .product-card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(0,0,0,0.05);
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.5);
        }
        .product-card:hover { transform: translateY(-6px); box-shadow: 0 12px 32px rgba(0,0,0,0.1); }
        
        .product-image {
            width: 100%;
            aspect-ratio: 4/3;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 12px;
            background: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .product-image img { width: 100%; height: 100%; object-fit: contain; }
        .product-image .no-image { font-size: 56px; }
        
        .product-name { font-weight: 700; font-size: 18px; margin: 8px 0; }
        .product-price { color: #e67e22; font-weight: 700; font-size: 20px; margin: 4px 0; }
        .product-desc { font-size: 13px; color: #6b7f94; margin: 8px 0; }
        
        .btn {
            background: #1e2f3f;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            width: 100%;
            margin-top: 10px;
        }
        .btn:hover { background: #2c4054; }
        .btn-outline { background: transparent; border: 2px solid #e2e8f0; color: #1e2f3f; }
        
        /* МОДАЛКА */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-y: auto;
        }
        .modal-content {
            background: white;
            border-radius: 32px;
            max-width: 500px;
            width: 100%;
            padding: 24px;
            position: relative;
            max-height: 95vh;
            overflow-y: auto;
        }
        .close-modal {
            position: absolute;
            top: 16px;
            right: 20px;
            font-size: 28px;
            cursor: pointer;
            z-index: 10;
            background: rgba(255,255,255,0.9);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .close-modal:hover { background: #f0f0f0; }
        
        /* ГАЛЕРЕЯ */
        .gallery-simple {
            position: relative;
            width: 100%;
            overflow: hidden;
            border-radius: 16px;
            background: #f0f2f5;
            touch-action: pan-y;
        }
        .gallery-simple .slides { display: flex; transition: transform 0.3s ease; }
        .gallery-simple .slide {
            min-width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 300px;
            position: relative;
            cursor: zoom-in;
        }
        .gallery-simple .slide img { width: 100%; height: 100%; object-fit: contain; }
        .gallery-simple .slide .empty { font-size: 64px; color: #999; }
        .gallery-simple .arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .gallery-simple .arrow:hover { background: rgba(0,0,0,0.8); }
        .gallery-simple .prev { left: 8px; }
        .gallery-simple .next { right: 8px; }
        .gallery-simple .dots { display: flex; justify-content: center; gap: 8px; margin-top: 8px; }
        .gallery-simple .dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; cursor: pointer; border: none; padding: 0; }
        .gallery-simple .dot.active { background: #1e2f3f; }
        .zoom-hint { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.5); color: #fff; padding: 2px 10px; border-radius: 12px; font-size: 10px; z-index: 3; pointer-events: none; }
        
        /* ЛУПА (ОВЕРЛЕЙ) */
        .zoom-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
            padding: 20px;
        }
        .zoom-overlay.active { display: flex; }
        .zoom-overlay img { max-width: 95%; max-height: 95%; object-fit: contain; border-radius: 8px; }
        .zoom-overlay .close-zoom { position: absolute; top: 20px; right: 30px; font-size: 40px; color: white; cursor: pointer; z-index: 2001; }
        
        /* РАЗМЕРЫ */
        .size-section { margin: 15px 0; padding: 12px; background: #f5f7fa; border-radius: 16px; }
        .size-section .label { font-weight: 600; font-size: 14px; display: block; margin-bottom: 8px; }
        .size-buttons { display: flex; gap: 10px; flex-wrap: wrap; }
        .size-btn { background: white; border: 2px solid #e2e8f0; padding: 8px 20px; border-radius: 30px; cursor: pointer; font-weight: 500; font-size: 14px; }
        .size-btn:hover { border-color: #1e2f3f; }
        .size-btn.selected { background: #1e2f3f; color: white; border-color: #1e2f3f; }
        .size-info { font-size: 13px; color: #6b7f94; margin-top: 10px; }
        
        /* КОРЗИНА */
        .cart-item { background: white; padding: 16px 20px; border-radius: 18px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .cart-item .info { flex: 1; min-width: 120px; }
        .cart-item .name { font-weight: 600; }
        .cart-item .size { font-size: 13px; color: #6b7f94; }
        .total-block { font-size: 24px; font-weight: 700; text-align: right; margin-top: 20px; padding-top: 16px; border-top: 2px solid #e2e8f0; }
        .empty-cart { text-align: center; padding: 60px 20px; color: #6b7f94; }
        .payment-card { background: #e8f5e9; border-radius: 18px; padding: 16px; text-align: center; margin: 16px 0; }
        .payment-card .card-number { font-size: 20px; font-weight: 700; letter-spacing: 2px; margin: 8px 0; color: #1a2332; }
        
        /* ФОРМА */
        input, select, textarea { width: 100%; padding: 12px 16px; border: 2px solid #e2e8f0; border-radius: 16px; font-size: 16px; font-family: inherit; margin-bottom: 12px; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #1e2f3f; }
        
        /* АДМИНКА */
        .admin-panel { background: white; border-radius: 24px; padding: 24px; }
        .photo-upload-area { background: #f5f7fa; padding: 15px; border-radius: 16px; margin: 10px 0; }
        .photo-preview { width: 100px; height: 100px; background: #e8ecf1; border-radius: 14px; margin: 10px 0; display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: pointer; }
        .photo-preview img { width: 100%; height: 100%; object-fit: cover; }
        .photo-preview .empty { font-size: 32px; color: #999; }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a2332;
            color: white;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 500;
            opacity: 0;
            transition: 0.4s;
            z-index: 3000;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            pointer-events: none;
        }
        .toast.show { opacity: 1; }
        
        @media (max-width: 768px) {
            .sidebar { width: 80px; padding: 1rem 0.5rem; }
            .sidebar .logo { font-size: 18px; text-align: center; }
            .nav-links a span:not(.cart-badge) { display: none; }
            .nav-links a { justify-content: center; font-size: 20px; }
            .main-content { padding: 1rem; }
            .products-grid { gap: 12px; }
            .product-card { padding: 14px; }
            .gallery-simple .slide { height: 250px; }
            .modal-content { padding: 16px; }
        }
    </style>
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="logo" onclick="navigate('home')">PALO<span>.</span></div>
            <div class="nav-links">
                <a onclick="navigate('home')">🏠 <span>Магазин</span></a>
                <a onclick="navigate('cart')">🛒 <span>Корзина</span> <span class="cart-badge" id="cartCount">0</span></a>
            </div>
            <div id="adminSecretLink" class="admin-link-hidden" onclick="showAdminAuth()">🔒 <span>Админ</span></div>
        </aside>
        <main class="main-content" id="app"></main>
    </div>
    <div id="toast" class="toast"></div>
    <div class="zoom-overlay" id="zoomOverlay" onclick="closeZoom()">
        <span class="close-zoom">&times;</span>
        <img id="zoomImage" src="">
    </div>

    <script>
        // ================================================================
        // ТОВАРЫ
        // ================================================================
        const products = [
            { id: 1, name: "Кепка", price: 1500, desc: "Хлопок, козырёк", emoji: "🧢", sizes: ["S","M","L"], measures: ["54-56 см","57-59 см","60-62 см"], frontImg: "", sideImg: "", mannequinImg: "" },
            { id: 2, name: "Футболка", price: 1900, desc: "Джерси, белый", emoji: "👕", sizes: ["S","M","L","XL"], measures: ["68/48 см","70/51 см","72/54 см","74/57 см"], frontImg: "", sideImg: "", mannequinImg: "" },
            { id: 3, name: "Брюки", price: 5200, desc: "Костюмная ткань", emoji: "👖", sizes: ["S","M","L","XL"], measures: ["100/72 см","102/76 см","104/80 см","106/84 см"], frontImg: "", sideImg: "", mannequinImg: "" },
            { id: 4, name: "Лонгслив", price: 2700, desc: "Трикотаж, чёрный", emoji: "🧥", sizes: ["S","M","L","XL"], measures: ["62/48 см","64/51 см","66/54 см","68/57 см"], frontImg: "", sideImg: "", mannequinImg: "" }
        ];

        // ================================================================
        // ДАННЫЕ
        // ================================================================
        let cart = JSON.parse(localStorage.getItem('cart') || '[]');
        let selectedSizes = JSON.parse(localStorage.getItem('selectedSizes') || '{}');
        let isAdminAuthenticated = false;
        let currentEditId = null;
        let clickCount = 0, clickTimer = null;
        let galleryIndex = 0, galleryImages = [];

        function saveCart() {
            localStorage.setItem('cart', JSON.stringify(cart));
            document.getElementById('cartCount').innerText = cart.reduce((s,i) => s + i.qty, 0);
        }
        function showToast(m) { let t = document.getElementById('toast'); t.innerText = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }
        function loadProducts() {
            let saved = localStorage.getItem('palo_products');
            if (saved) {
                try {
                    let parsed = JSON.parse(saved);
                    if (parsed && parsed.length) {
                        for (let i = 0; i < parsed.length; i++) {
                            if (products[i]) {
                                products[i].frontImg = parsed[i].frontImg || '';
                                products[i].sideImg = parsed[i].sideImg || '';
                                products[i].mannequinImg = parsed[i].mannequinImg || '';
                            }
                        }
                    }
                } catch(e) {}
            }
        }
        function saveProducts() { localStorage.setItem('palo_products', JSON.stringify(products)); }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; document.body.style.overflow = 'hidden'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; document.body.style.overflow = ''; }

        // ================================================================
        // ЛУПА
        // ================================================================
        function openZoom(src) {
            if (!src) return;
            document.getElementById('zoomImage').src = src;
            document.getElementById('zoomOverlay').classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        function closeZoom() {
            document.getElementById('zoomOverlay').classList.remove('active');
            document.body.style.overflow = '';
        }
        document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeZoom(); });

        // ================================================================
        // РАЗМЕРЫ
        // ================================================================
        function selectSize(productId, size, idx) {
            selectedSizes[productId] = size;
            localStorage.setItem('selectedSizes', JSON.stringify(selectedSizes));
            document.querySelectorAll(`.size-${productId}`).forEach(btn => {
                btn.classList.toggle('selected', btn.innerText === size);
            });
            let p = products.find(x => x.id === productId);
            if (p) document.getElementById(`sizeInfo-${productId}`).innerText = p.measures[idx];
        }

        // ================================================================
        // КОРЗИНА
        // ================================================================
        function addToCart(id) {
            let p = products.find(x => x.id === id);
            let size = selectedSizes[id];
            if (p.sizes && !size) { showToast('⚠️ Выберите размер!'); return; }
            let item = cart.find(i => i.id === id && i.size === size);
            if (item) item.qty++;
            else cart.push({ id, qty: 1, size: size || 'OS' });
            saveCart();
            showToast('✓ Добавлено');
            navigate('cart');
        }
        function removeFromCart(id, size) {
            cart = cart.filter(i => !(i.id === id && i.size === size));
            saveCart();
            navigate('cart');
        }

        // ================================================================
        // TELEGRAM
        // ================================================================
        function sendOrderToTelegram(orderDetails, total, customer) {
            const TOKEN = '8758635199:AAEG8B69jBqbW1fmwLZUbrso5w1VIrHonKg';
            const CHAT_ID = '5820655432';
            let text = `🛍️ НОВЫЙ ЗАКАЗ PALO\n\n👤 ${customer.name}\n📞 ${customer.phone}\n📍 ${customer.address}\n🚚 ${customer.delivery}\n\n📦 ${orderDetails}\n💰 ИТОГО: ${total} ₽\n💳 Карта: 2200 7020 0430 8479`;
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: text })
            }).then(r => r.json()).then(data => {
                if (data.ok) { showToast('✅ Заказ отправлен!'); cart = []; saveCart(); closeModal('orderModal'); navigate('home'); }
                else showToast('❌ Ошибка');
            }).catch(() => showToast('❌ Ошибка соединения'));
        }

        // ================================================================
        // ГАЛЕРЕЯ
        // ================================================================
        function createGallery(images) {
            let slidesHtml = '';
            images.forEach(img => {
                slidesHtml += `<div class="slide" onclick="openZoom('${img || ''}')">${img ? `<img src="${img}">` : `<span class="empty">📸</span>`}</div>`;
            });
            return `
                <div class="gallery-simple" id="galleryContainer">
                    <div class="slides" id="gallerySlides">${slidesHtml}</div>
                    ${images.length > 1 ? `
                        <button class="arrow prev" onclick="slideGallery(-1)">‹</button>
                        <button class="arrow next" onclick="slideGallery(1)">›</button>
                        <div class="dots" id="galleryDots"></div>
                    ` : ''}
                    <div class="zoom-hint">🔍 Нажмите для увеличения</div>
                </div>
            `;
        }
        function slideGallery(d) {
            const slides = document.getElementById('gallerySlides');
            if (!slides) return;
            const total = galleryImages.length;
            if (total <= 1) return;
            galleryIndex = (galleryIndex + d + total) % total;
            slides.style.transform = `translateX(-${galleryIndex * 100}%)`;
            document.querySelectorAll('#galleryDots .dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === galleryIndex);
            });
        }

        // ================================================================
        // ОТКРЫТИЕ ТОВАРА
        // ================================================================
        function openProductModal(productId) {
            let p = products.find(pr => pr.id === productId);
            let currentSize = selectedSizes[productId] || '';
            const images = [];
            if (p.frontImg) images.push(p.frontImg);
            if (p.sideImg) images.push(p.sideImg);
            if (p.mannequinImg) images.push(p.mannequinImg);
            if (images.length === 0) images.push(null);
            galleryImages = images;
            galleryIndex = 0;
            
            let sizeHtml = '';
            if (p.sizes) {
                sizeHtml = `<div class="size-section">
                    <span class="label">📏 Выберите размер:</span>
                    <div class="size-buttons">`;
                p.sizes.forEach((size, idx) => {
                    sizeHtml += `<button class="size-btn size-${p.id} ${currentSize === size ? 'selected' : ''}" onclick="selectSize(${p.id}, '${size}', ${idx})">${size}</button>`;
                });
                sizeHtml += `</div>
                    <div class="size-info" id="sizeInfo-${p.id}">${currentSize ? p.measures[p.sizes.indexOf(currentSize)] : 'Нажмите на размер'}</div>
                </div>`;
            }
            
            document.getElementById('productModalContent').innerHTML = `
                <span class="close-modal" onclick="closeModal('productModal')">&times;</span>
                ${createGallery(images)}
                <div style="text-align:center;margin-top:12px;">
                    <h2>${p.name}</h2>
                    <div style="font-size:24px;font-weight:700;color:#e67e22;margin:6px 0;">${p.price} ₽</div>
                    <div style="color:#6b7f94;font-size:14px;">${p.desc}</div>
                    ${sizeHtml}
                    <button class="btn" onclick="addToCart(${p.id}); closeModal('productModal');">🛒 Добавить</button>
                </div>
            `;
            openModal('productModal');
            setTimeout(() => {
                const dots = document.getElementById('galleryDots');
                if (dots && images.length > 1) {
                    dots.innerHTML = '';
                    images.forEach((_, i) => {
                        let dot = document.createElement('button');
                        dot.className = 'dot' + (i === 0 ? ' active' : '');
                        dot.onclick = () => {
                            galleryIndex = i;
                            const slides = document.getElementById('gallerySlides');
                            if (slides) slides.style.transform = `translateX(-${i * 100}%)`;
                            document.querySelectorAll('#galleryDots .dot').forEach((d, j) => {
                                d.classList.toggle('active', j === i);
                            });
                        };
                        dots.appendChild(dot);
                    });
                }
                const slides = document.getElementById('gallerySlides');
                if (slides) slides.style.transform = 'translateX(0%)';
            }, 50);
        }

        // ================================================================
        // ЗАКАЗ
        // ================================================================
        function openOrderModal() {
            if (cart.length === 0) { showToast('Корзина пуста'); return; }
            openModal('orderModal');
        }
        function closeOrderModal() { closeModal('orderModal'); }
        function submitOrder() {
            let name = document.getElementById('orderName').value.trim();
            let phone = document.getElementById('orderPhone').value.trim();
            let address = document.getElementById('orderAddress').value.trim();
            let delivery = document.getElementById('orderDelivery').value;
            if (!name || !phone || !address) { showToast('Заполните поля'); return; }
            let lines = '', total = 0;
            cart.forEach(item => {
                let p = products.find(pr => pr.id === item.id);
                let sum = p.price * item.qty;
                total += sum;
                lines += `• ${p.name} (${item.size || 'OS'}) — ${item.qty}шт × ${p.price}₽ = ${sum}₽\n`;
            });
            sendOrderToTelegram(lines, total, { name, phone, address, delivery });
            closeOrderModal();
        }

        // ================================================================
        // АДМИНКА
        // ================================================================
        document.querySelector('.logo').addEventListener('click', function() {
            clickCount++;
            clearTimeout(clickTimer);
            clickTimer = setTimeout(() => { clickCount = 0; }, 1000);
            if (clickCount >= 5) {
                clickCount = 0;
                localStorage.setItem('adminShown', 'true');
                document.getElementById('adminSecretLink').classList.add('visible');
                showToast('🔓 Админ-панель активирована');
            }
        });

        function showAdminAuth() {
            if (isAdminAuthenticated) { renderAdmin(); return; }
            openModal('adminAuthModal');
        }
        function closeAdminAuth() { closeModal('adminAuthModal'); document.getElementById('adminPassword').value = ''; }
        function checkAdminPassword() {
            let pwd = document.getElementById('adminPassword').value;
            if (pwd === 'admin123') {
                isAdminAuthenticated = true;
                closeAdminAuth();
                showToast('✅ Добро пожаловать');
                renderAdmin();
            } else showToast('❌ Неверный пароль');
        }

        // ================================================================
        // ЗАГРУЗКА ФОТО
        // ================================================================
        function handleImageUpload(event, fieldId, previewId) {
            let file = event.target.files[0];
            if (!file) return;
            if (file.size > 5 * 1024 * 1024) { showToast('⚠️ Файл >5 МБ'); return; }
            let reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById(fieldId).value = e.target.result;
                document.getElementById(previewId).innerHTML = `<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover;">`;
                showToast('✅ Фото загружено! Нажмите "Сохранить"');
            };
            reader.readAsDataURL(file);
        }

        function saveProduct() {
            let name = document.getElementById('prodName').value.trim();
            let price = parseInt(document.getElementById('prodPrice').value);
            let desc = document.getElementById('prodDesc').value;
            let emoji = document.getElementById('prodEmoji').value;
            let frontImg = document.getElementById('frontVal').value;
            let sideImg = document.getElementById('sideVal').value;
            let mannequinImg = document.getElementById('manVal').value;
            if (!name || isNaN(price)) { showToast('Заполните название и цену'); return; }
            if (currentEditId) {
                let idx = products.findIndex(p => p.id === currentEditId);
                if (idx !== -1) {
                    products[idx].name = name;
                    products[idx].price = price;
                    products[idx].desc = desc;
                    products[idx].emoji = emoji;
                    products[idx].frontImg = frontImg;
                    products[idx].sideImg = sideImg;
                    products[idx].mannequinImg = mannequinImg;
                }
            }
            saveProducts();
            let msg = document.getElementById('adminMsg');
            if (msg) {
                msg.innerHTML = '<div style="background:#e0f2e9; padding:10px; border-radius:12px;">✓ Сохранено</div>';
                setTimeout(() => msg.innerHTML = '', 3000);
            }
            showToast('✅ Товар сохранён');
            currentEditId = null;
            renderAdmin();
        }

        function renderHome() {
            let html = '<div class="section-title">Коллекция</div><div class="products-grid">';
            products.forEach(p => {
                let imgHtml = p.frontImg ? `<img src="${p.frontImg}">` : `<span class="no-image">${p.emoji}</span>`;
                html += `<div class="product-card" onclick="openProductModal(${p.id})">
                    <div class="product-image">${imgHtml}</div>
                    <div class="product-name">${p.name}</div>
                    <div class="product-price">${p.price} ₽</div>
                    <div class="product-desc">${p.desc}</div>
                    <button class="btn" onclick="event.stopPropagation(); openProductModal(${p.id})">🔍 Выбрать размер</button>
                </div>`;
            });
            html += '</div>';
            document.getElementById('app').innerHTML = html;
        }

        function renderCart() {
            if (cart.length === 0) {
                document.getElementById('app').innerHTML = '<div class="section-title">Корзина</div><div class="empty-cart"><span class="icon">🛒</span><h3>Корзина пуста</h3></div>';
                return;
            }
            let total = 0, html = '<div class="section-title">Корзина</div>';
            cart.forEach(item => {
                let p = products.find(pr => pr.id === item.id);
                let sum = p.price * item.qty;
                total += sum;
                html += `<div class="cart-item">
                    <div class="info"><div class="name">${p.name}</div><div class="size">${item.size || 'OS'}</div><div>${item.qty} шт × ${p.price} ₽</div></div>
                    <div><strong>${sum} ₽</strong></div>
                    <button class="btn-outline" style="width:auto;padding:6px 16px;margin:0;" onclick="removeFromCart(${p.id}, '${item.size || ''}')">🗑</button>
                </div>`;
            });
            html += `<div class="total-block">Итого: ${total} ₽</div>`;
            html += `<button class="btn" style="max-width:280px;margin-top:16px;" onclick="openOrderModal()">💳 Оформить заказ</button>`;
            document.getElementById('app').innerHTML = html;
        }

        function renderAdmin() {
            if (!isAdminAuthenticated) {
                document.getElementById('app').innerHTML = `<div style="text-align:center;padding:50px;"><h3>🔒 Доступ закрыт</h3><p>5 кликов по логотипу → Админ → пароль admin123</p></div>`;
                return;
            }
            let html = `<div class="admin-panel"><h2>📷 Управление</h2><div id="adminMsg"></div><div id="adminForm"></div><h3 style="margin:20px 0 10px;">Список</h3>`;
            products.forEach(p => {
                html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #eee;">
                    <span>${p.frontImg ? '📷' : '📸'} <strong>${p.name}</strong> — ${p.price}₽</span>
                    <button onclick="editProduct(${p.id})" class="btn-outline" style="padding:5px 15px;width:auto;">✏️</button>
                </div>`;
            });
            html += `</div>`;
            document.getElementById('app').innerHTML = html;
            if (currentEditId) {
                let prod = products.find(p => p.id === currentEditId);
                if (prod) renderAdminForm(prod);
            } else renderAdminForm(null);
        }
