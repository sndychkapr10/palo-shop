<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PALO — магазин одежды</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; }
        .header { background: white; padding: 15px 20px; display: flex; justify-content: space-between; border-bottom: 1px solid #ddd; }
        .logo { font-size: 24px; font-weight: bold; cursor: pointer; }
        .nav a { margin-left: 20px; cursor: pointer; }
        .cart-count { background: #333; color: white; border-radius: 50%; padding: 2px 8px; font-size: 12px; }
        .main { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .products { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .product { background: white; border-radius: 16px; padding: 15px; text-align: center; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .product-emoji { font-size: 64px; }
        .product-name { font-weight: bold; margin: 10px 0; }
        .product-price { color: #e67e22; font-weight: bold; }
        .btn { background: #333; color: white; border: none; padding: 8px 16px; border-radius: 30px; cursor: pointer; width: 100%; margin-top: 10px; }
        .size-selector { margin: 15px 0; }
        .size-btn { background: #eee; border: none; padding: 8px 15px; margin: 0 5px; border-radius: 30px; cursor: pointer; }
        .size-btn.selected { background: #333; color: white; }
        .size-chart { font-size: 12px; color: #666; margin-top: 8px; }
        .cart-item { background: white; padding: 15px; border-radius: 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .total { font-size: 20px; font-weight: bold; text-align: right; margin-top: 20px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; border-radius: 30px; max-width: 500px; width: 90%; padding: 20px; position: relative; }
        .close-modal { position: absolute; top: 10px; right: 20px; font-size: 30px; cursor: pointer; }
        .payment-info { background: #e8f5e9; padding: 15px; border-radius: 16px; margin: 15px 0; text-align: center; }
        .card-number { font-size: 18px; font-weight: bold; letter-spacing: 2px; margin: 10px 0; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 30px; opacity: 0; transition: 0.3s; }
        .toast.show { opacity: 1; }
        @media (max-width: 700px) {
            .products { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo" onclick="navigate('home')">PALO</div>
        <div class="nav">
            <a onclick="navigate('home')">Магазин</a>
            <a onclick="navigate('cart')">Корзина <span class="cart-count" id="cartCount">0</span></a>
        </div>
    </div>
    <div class="main" id="app"></div>
    <div id="toast" class="toast"></div>

    <script>
        const TELEGRAM_BOT_TOKEN = '8758635199:AAEG8B69jBqbW1fmwLZUbrso5w1VIrHonKg';
        const TELEGRAM_CHAT_ID = '5820655432';
        
        const products = [
            { id: 1, name: "Кепка", price: 1500, desc: "Хлопок, козырёк", emoji: "🧢" },
            { id: 2, name: "Футболка", price: 1900, desc: "Джерси, белый", emoji: "👕" },
            { id: 3, name: "Брюки", price: 5200, desc: "Костюмная ткань", emoji: "👖" },
            { id: 4, name: "Лонгслив", price: 2700, desc: "Трикотаж, чёрный", emoji: "🧥" }
        ];
        
        const sizeData = {
            1: { sizes: ["S", "M", "L"], measures: ["54-56 см", "57-59 см", "60-62 см"] },
            2: { sizes: ["S", "M", "L", "XL"], measures: ["68 см, грудь 48", "70 см, грудь 51", "72 см, грудь 54", "74 см, грудь 57"] },
            3: { sizes: ["S", "M", "L", "XL"], measures: ["100 см, талия 72", "102 см, талия 76", "104 см, талия 80", "106 см, талия 84"] },
            4: { sizes: ["S", "M", "L", "XL"], measures: ["рукав 62, грудь 48", "рукав 64, грудь 51", "рукав 66, грудь 54", "рукав 68, грудь 57"] }
        };
        
        let cart = JSON.parse(localStorage.getItem('cart') || '[]');
        let selectedSizes = JSON.parse(localStorage.getItem('selectedSizes') || '{}');
        
        function saveCart() {
            localStorage.setItem('cart', JSON.stringify(cart));
            document.getElementById('cartCount').innerText = cart.reduce((s,i)=>s+i.qty,0);
        }
        
        function showToast(msg) {
            let t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }
        
        function selectSize(productId, size, idx) {
            selectedSizes[productId] = size;
            localStorage.setItem('selectedSizes', JSON.stringify(selectedSizes));
            document.querySelectorAll(`.size-btn-${productId}`).forEach((btn, i) => {
                if (btn.innerText === size) btn.classList.add('selected');
                else btn.classList.remove('selected');
            });
            document.getElementById(`size-chart-${productId}`).innerText = sizeData[productId].measures[idx];
            showToast(`Размер ${size} выбран`);
        }
        
        function addToCart(id) {
            const size = selectedSizes[id];
            if (sizeData[id] && !size) {
                showToast('Сначала выберите размер!');
                return;
            }
            let item = cart.find(i => i.id === id && i.size === size);
            if (item) item.qty++;
            else cart.push({ id, qty: 1, size: size || 'OS' });
            saveCart();
            showToast('✓ Добавлено в корзину');
        }
        
        function removeFromCart(id, size) {
            cart = cart.filter(i => !(i.id === id && i.size === size));
            saveCart();
            navigate('cart');
        }
        
        function renderSizeSelector(productId) {
            const data = sizeData[productId];
            if (!data) return '';
            const current = selectedSizes[productId] || '';
            let html = `<div class="size-selector"><div>📏 Выберите размер:</div><div>`;
            data.sizes.forEach((size, idx) => {
                html += `<button class="size-btn size-btn-${productId} ${current === size ? 'selected' : ''}" onclick="selectSize(${productId}, '${size}', ${idx})">${size}</button>`;
            });
            html += `</div><div class="size-chart" id="size-chart-${productId}">`;
            if (current && data.sizes.indexOf(current) >= 0) {
                html += data.measures[data.sizes.indexOf(current)];
            } else {
                html += 'Нажмите на размер для замеров';
            }
            html += `</div></div>`;
            return html;
        }
        
        function renderHome() {
            let html = '<h2>Коллекция</h2><div class="products">';
            products.forEach(p => {
                html += `
                    <div class="product" onclick="openModal(${p.id})">
                        <div class="product-emoji">${p.emoji}</div>
                        <div class="product-name">${p.name}</div>
                        <div class="product-price">${p.price} ₽</div>
                        <div style="font-size:12px;">${p.desc}</div>
                        <button class="btn" onclick="event.stopPropagation();openModal(${p.id})">🔍 Выбрать размер</button>
                    </div>
                `;
            });
            html += '</div>';
            return html;
        }
        
        function openModal(productId) {
            const p = products.find(pr => pr.id === productId);
            const modal = document.getElementById('productModal');
            document.getElementById('modalBody').innerHTML = `
                <h2>${p.name}</h2>
                <div class="product-price">${p.price} ₽</div>
                <div style="margin:10px 0;">${p.desc}</div>
                ${renderSizeSelector(productId)}
                <button class="btn" onclick="addToCart(${productId}); closeModal();">🛒 Добавить в корзину</button>
            `;
            modal.style.display = 'flex';
        }
        
        function closeModal() {
            document.getElementById('productModal').style.display = 'none';
        }
        
        function renderCart() {
            if (cart.length === 0) return '<h2>Корзина пуста</h2>';
            let total = 0;
            let html = '<h2>Корзина</h2>';
            cart.forEach(item => {
                const p = products.find(pr => pr.id === item.id);
                const sum = p.price * item.qty;
                total += sum;
                html += `
                    <div class="cart-item">
                        <div><strong>${p.name}</strong> (${item.size || 'OS'}) × ${item.qty}</div>
                        <div>${sum} ₽</div>
                        <button class="btn" style="width:auto; background:#999;" onclick="removeFromCart(${p.id}, '${item.size}')">Удалить</button>
                    </div>
                `;
            });
            html += `<div class="total">Итого: ${total} ₽</div>`;
            html += `<button class="btn" onclick="openOrderModal()">💳 Оформить заказ</button>`;
            return html;
        }
        
        function openOrderModal() {
            if (cart.length === 0) { showToast('Корзина пуста'); return; }
            document.getElementById('orderModal').style.display = 'flex';
        }
        
        function closeOrderModal() {
            document.getElementById('orderModal').style.display = 'none';
        }
        
        function submitOrder() {
            const name = document.getElementById('orderName').value.trim();
            const phone = document.getElementById('orderPhone').value.trim();
            const address = document.getElementById('orderAddress').value.trim();
            const delivery = document.getElementById('orderDelivery').value;
            if (!name || !phone || !address) { showToast('Заполните все поля'); return; }
            
            let lines = '';
            let total = 0;
            cart.forEach(item => {
                const p = products.find(pr => pr.id === item.id);
                const sum = p.price * item.qty;
                total += sum;
                lines += `• ${p.name} (${item.size || 'OS'}) — ${item.qty}шт × ${p.price}₽ = ${sum}₽\n`;
            });
            
            const text = `🛍️ НОВЫЙ ЗАКАЗ PALO\n\n👤 ${name}\n📞 ${phone}\n📍 ${address}\n🚚 ${delivery}\n\n📦 ${lines}\n💰 ИТОГО: ${total} ₽\n💳 Перевод на карту 2200 7020 0430 8479`;
            
            fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({chat_id: TELEGRAM_CHAT_ID, text: text})
            }).then(r => r.json()).then(d => {
                if (d.ok) {
                    showToast('✅ Заказ отправлен!');
                    cart = [];
                    saveCart();
                    closeOrderModal();
                    navigate('home');
                } else {
                    showToast('❌ Ошибка');
                }
            }).catch(() => showToast('❌ Ошибка соединения'));
        }
        
        function navigate(page) {
            const app = document.getElementById('app');
            if (page === 'home') app.innerHTML = renderHome();
            else if (page === 'cart') app.innerHTML = renderCart();
        }
        
        saveCart();
        navigate('home');
        
        window.selectSize = selectSize;
        window.addToCart = addToCart;
        window.removeFromCart = removeFromCart;
        window.openModal = openModal;
        window.closeModal = closeModal;
        window.openOrderModal = openOrderModal;
        window.closeOrderModal = closeOrderModal;
        window.submitOrder = submitOrder;
        window.navigate = navigate;
    </script>

    <!-- Модальное окно товара -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <!-- Модальное окно заказа -->
    <div id="orderModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeOrderModal()">&times;</span>
            <h2>🛍️ Оформление заказа</h2>
            <input type="text" id="orderName" placeholder="Ваше имя *" style="width:100%; padding:10px; margin:10px 0; border-radius:10px; border:1px solid #ddd;">
            <input type="tel" id="orderPhone" placeholder="Телефон *" style="width:100%; padding:10px; margin:10px 0; border-radius:10px; border:1px solid #ddd;">
            <textarea id="orderAddress" rows="2" placeholder="Адрес доставки *" style="width:100%; padding:10px; margin:10px 0; border-radius:10px; border:1px solid #ddd;"></textarea>
            <select id="orderDelivery" style="width:100%; padding:10px; margin:10px 0; border-radius:10px; border:1px solid #ddd;">
                <option>СДЭК</option>
                <option>Почта России</option>
                <option>Курьером</option>
                <option>Самовывоз</option>
            </select>
            <div class="payment-info">
                💳 <strong>Оплата переводом на карту</strong><br>
                <div class="card-number">2200 7020 0430 8479</div>
                <div style="font-size:12px;">После заказа переведите сумму на карту</div>
            </div>
            <button class="btn" onclick="submitOrder()">✅ Оформить заказ</button>
        </div>
    </div>
</body>
</html>
