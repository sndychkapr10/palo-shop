<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PALO — магазин одежды</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, sans-serif; background: #f4f6fa; color: #1a2634; overflow-x: hidden; }
        .app-horizontal { display: flex; min-height: 100vh; flex-direction: row; }
        .sidebar {
            width: 280px; background: rgba(255,255,255,0.96); backdrop-filter: blur(12px);
            border-right: 1px solid #e2e8f0; padding: 2rem 1.5rem; position: sticky; top: 0;
            height: 100vh; display: flex; flex-direction: column; gap: 2rem;
        }
        .logo { font-size: 1.9rem; font-weight: 700; cursor: pointer; color: #0f1722; }
        .logo span { font-weight: 300; color: #5b6e8c; }
        .nav-links { display: flex; flex-direction: column; gap: 1.2rem; }
        .nav-links a { cursor: pointer; font-weight: 500; color: #2c3e50; padding: 0.6rem 0; display: flex; align-items: center; gap: 12px; }
        .cart-badge { background: #1f2a3e; color: white; border-radius: 40px; padding: 0.2rem 0.65rem; font-size: 0.7rem; margin-left: auto; }
        .admin-link-hidden { margin-top: auto; font-size: 0.85rem; opacity: 0; cursor: pointer; transition: opacity 0.3s; text-align: center; padding: 0.5rem; border-radius: 20px; background: rgba(0,0,0,0.05); }
        .admin-link-hidden.visible { opacity: 0.7; }
        .main-content { flex: 1; padding: 2rem; width: 0; min-width: 0; }
        .products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 2rem; margin-top: 1rem; }
        .product-card { background: white; border-radius: 28px; overflow: hidden; cursor: pointer; border: 1px solid #eef2f8; transition: 0.25s; }
        .product-card:hover { transform: translateY(-6px); box-shadow: 0 20px 30px -12px rgba(0,0,0,0.1); }
        .product-image { aspect-ratio: 3/4; background: #f8fafd; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .product-image img { width: 100%; height: 100%; object-fit: cover; }
        .product-info { padding: 1rem; }
        .product-name { font-weight: 700; }
        .product-price { font-weight: 600; color: #2c3e50; margin: 0.4rem 0; }
        .btn { background: #1e2f3f; color: white; border: none; padding: 0.6rem; border-radius: 40px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 0.5rem; }
        .btn-outline { background: transparent; border: 1px solid #cbdde9; color: #1f2f3e; }
        .btn-success { background: #2e7d32; color: white; }
        .modal, .order-modal, .admin-auth-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); backdrop-filter: blur(12px); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content, .order-modal-content, .admin-auth-content { background: white; border-radius: 40px; max-width: 1300px; width: 92%; padding: 1.6rem; position: relative; }
        .order-modal-content, .admin-auth-content { max-width: 500px; text-align: center; }
        .close-modal { position: absolute; top: 1rem; right: 1.8rem; font-size: 2rem; cursor: pointer; }
        .gallery-horizontal { display: flex; gap: 2rem; flex-wrap: wrap; }
        .zoom-preview { flex: 3; min-width: 280px; background: #f5f9ff; border-radius: 32px; display: flex; justify-content: center; align-items: center; min-height: 480px; position: relative; overflow: hidden; }
        .zoom-image-main { max-width: 100%; max-height: 540px; object-fit: contain; cursor: crosshair; transition: transform 0.2s; }
        .zoom-lens { position: absolute; width: 130px; height: 130px; background: rgba(255,255,240,0.25); border: 2px solid white; border-radius: 50%; pointer-events: none; display: none; }
        .thumb-vertical { flex: 1; display: flex; flex-direction: column; gap: 1rem; min-width: 100px; }
        .thumb-angle { background: #f1f5f9; border-radius: 24px; padding: 0.6rem; cursor: pointer; border: 2px solid transparent; }
        .thumb-angle.active { border-color: #1e2f3f; background: white; }
        .thumb-angle img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 18px; }
        .admin-panel { background: white; border-radius: 32px; padding: 2rem; }
        .photo-group { 
            background: #f9fbfe; 
            border-radius: 24px; 
            padding: 1rem; 
            margin-bottom: 1.5rem;
            border: 1px solid #eef2fa;
        }
        .photo-label { font-weight: 600; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem; }
        .photo-preview { 
            width: 100px; 
            height: 100px; 
            background: #eef2fa; 
            border-radius: 16px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
            margin: 0.5rem 0;
            font-size: 2rem;
            cursor: pointer;
            border: 1px dashed #ccc;
        }
        .photo-preview img { width: 100%; height: 100%; object-fit: cover; }
        .payment-info {
            background: #e8f5e9;
            border-radius: 20px;
            padding: 1rem;
            margin: 1rem 0;
            text-align: center;
        }
        .card-number {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin: 0.5rem 0;
        }
        .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 0.6rem 2rem; border-radius: 60px; opacity: 0; transition: 0.2s; z-index: 3000; }
        .toast.show { opacity: 1; }
        
        @media (max-width: 780px) {
            .sidebar { width: 80px; padding: 1rem 0.5rem; }
            .sidebar .logo { font-size: 1.2rem; text-align: center; }
            .nav-links a span:not(.cart-badge) { display: none; }
            .nav-links a { justify-content: center; }
            .main-content { padding: 1rem; }
            .products-grid { gap: 1rem; }
            .btn, .btn-outline { font-size: 14px; padding: 10px; min-height: 44px; }
            .photo-preview { width: 80px; height: 80px; }
            .card-number { font-size: 1rem; letter-spacing: 1px; }
        }
    </style>
</head>
<body>
<div class="app-horizontal">
    <aside class="sidebar">
        <div class="logo" onclick="navigate('home')">PALO<span>.</span></div>
        <div class="nav-links">
            <a onclick="navigate('home')">🏠 <span>Магазин</span></a>
            <a onclick="navigate('cart')">🛒 <span>Корзина</span> <span class="cart-badge" id="cart-count">0</span></a>
        </div>
        <div id="adminSecretLink" class="admin-link-hidden" onclick="showAdminAuth()">🔒 <span>Админ</span></div>
    </aside>
    <main class="main-content" id="app"></main>
</div>
<div id="toast" class="toast"></div>

<script>
    const TELEGRAM_BOT_TOKEN = '8758635199:AAEG8B69jBqbW1fmwLZUbrso5w1VIrHonKg';
    const TELEGRAM_CHAT_ID = '5820655432';
    const ADMIN_PASSWORD = 'admin123';
    
    let isAdminAuthenticated = false;
    let clickCount = 0;
    let clickTimer = null;

    document.querySelector('.logo').addEventListener('click', function() {
        clickCount++;
        clearTimeout(clickTimer);
        clickTimer = setTimeout(() => { clickCount = 0; }, 1000);
        if (clickCount >= 5) {
            clickCount = 0;
            document.getElementById('adminSecretLink').classList.add('visible');
            showToast('🔓 Секретная панель активирована');
        }
    });

    function showAdminAuth() { if (isAdminAuthenticated) { navigate('admin'); return; } document.getElementById('adminAuthModal').style.display = 'flex'; }
    function closeAdminAuth() { document.getElementById('adminAuthModal').style.display = 'none'; document.getElementById('adminPassword').value = ''; }
    function checkAdminPassword() {
        if (document.getElementById('adminPassword').value === ADMIN_PASSWORD) {
            isAdminAuthenticated = true; closeAdminAuth(); showToast('✅ Доступ разрешён'); navigate('admin');
        } else { showToast('❌ Неверный пароль'); document.getElementById('adminPassword').value = ''; }
    }

    const defaultProducts = [
        { id: 1, name: "Кепка", price: 1500, desc: "Хлопок, козырёк", frontImg: "", sideImg: "", mannequinImg: "", emoji: "🧢" },
        { id: 2, name: "Футболка", price: 1900, desc: "Джерси, белый", frontImg: "", sideImg: "", mannequinImg: "", emoji: "👕" },
        { id: 3, name: "Брюки", price: 5200, desc: "Костюмная ткань", frontImg: "", sideImg: "", mannequinImg: "", emoji: "👖" },
        { id: 4, name: "Лонгслив", price: 2700, desc: "Трикотаж, чёрный", frontImg: "", sideImg: "", mannequinImg: "", emoji: "🧥" }
    ];

    function getProducts() { const s = localStorage.getItem('palo_shop'); return s ? JSON.parse(s) : JSON.parse(JSON.stringify(defaultProducts)); }
    function saveProducts(p) { localStorage.setItem('palo_shop', JSON.stringify(p)); }
    function getCart() { const c = localStorage.getItem('palo_cart'); return c ? JSON.parse(c) : []; }
    function saveCart(c) { localStorage.setItem('palo_cart', JSON.stringify(c)); updateCartCount(); }
    function updateCartCount() { const cnt = getCart().reduce((s,i)=>s+i.qty,0); const b = document.getElementById('cart-count'); if(b) b.innerText = cnt; }
    function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }
    function addToCart(id) { let cart = getCart(); const ex = cart.find(i=>i.id===id); ex ? ex.qty++ : cart.push({id,qty:1}); saveCart(cart); showToast('✓ В корзине'); }
    
    function removeFromCart(id) { 
        let cart = getCart(); 
        cart = cart.filter(i => i.id !== id); 
        saveCart(cart); 
        navigate('cart'); 
        showToast('✓ Товар удалён');
    }

    function sendOrderToTelegram(orderDetails, totalAmount, customerData) {
        const text = `🛍️ НОВЫЙ ЗАКАЗ PALO\n\n👤 Имя: ${customerData.name}\n📞 Телефон: ${customerData.phone}\n📍 Адрес: ${customerData.address}\n🚚 Доставка: ${customerData.delivery}\n\n📦 Состав заказа:\n${orderDetails}\n\n💰 ИТОГО: ${totalAmount.toLocaleString()} ₽\n💳 Оплата: перевод на карту 2200 7020 0430 8479\n\n🕐 ${new Date().toLocaleString()}`;
        fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({chat_id: TELEGRAM_CHAT_ID, text: text})
        }).then(response => response.json()).then(data => {
            if (data.ok) {
                showToast('✅ Заказ отправлен! Проверьте Telegram');
                localStorage.removeItem('palo_cart');
                updateCartCount();
                setTimeout(() => navigate('home'), 1500);
            } else {
                showToast('❌ Ошибка отправки');
            }
        }).catch(() => showToast('❌ Ошибка соединения'));
    }

    function openOrderModal() { if(getCart().length===0){ showToast('Корзина пуста'); return; } document.getElementById('orderModal').style.display='flex'; }
    function closeOrderModal() { document.getElementById('orderModal').style.display='none'; }
    function submitOrder() {
        const name = document.getElementById('orderName').value.trim();
        const phone = document.getElementById('orderPhone').value.trim();
        const address = document.getElementById('orderAddress').value.trim();
        const delivery = document.getElementById('orderDelivery').value;
        if(!name||!phone||!address){ showToast('Заполните все поля'); return; }
        const cart = getCart(); const products = getProducts();
        let lines=''; let total=0;
        cart.forEach(i=>{ const p=products.find(pr=>pr.id===i.id); if(p){ const s=p.price*i.qty; total+=s; lines+=`• ${p.name} — ${i.qty} шт × ${p.price} ₽ = ${s} ₽\n`; } });
        sendOrderToTelegram(lines,total,{name,phone,address,delivery});
        closeOrderModal();
    }

    let currentProduct=null, currentAngle='front';
    function openModal(p){ currentProduct=p; currentAngle='front'; renderModal(); document.getElementById('productModal').style.display='flex'; bindZoom(); }
    function closeModal(){ document.getElementById('productModal').style.display='none'; }
    function switchAngle(a){ currentAngle=a; renderModal(); bindZoom(); }
    function renderModal(){
        const p=currentProduct;
        const angles=[{key:'front',img:p.frontImg},{key:'side',img:p.sideImg},{key:'mannequin',img:p.mannequinImg}];
        let activeImg = currentAngle==='front'?p.frontImg:(currentAngle==='side'?p.sideImg:p.mannequinImg);
        if(!activeImg) activeImg = angles.find(a=>a.img)?.img||'';
        let thumbs='';
        angles.forEach(a=>{ if(a.img) thumbs+=`<div class="thumb-angle ${currentAngle===a.key?'active':''}" onclick="switchAngle('${a.key}')"><img src="${a.img}"></div>`; });
        document.getElementById('modalBody').innerHTML = `
            <div class="gallery-horizontal">
                <div class="zoom-preview" id="zoomArea">${activeImg?`<img id="zoomImg" class="zoom-image-main" src="${activeImg}">`:'<div>Нет фото</div>'}<div id="zoomLens" class="zoom-lens"></div></div>
                <div class="thumb-vertical">${thumbs||'<div>Загрузите фото</div>'}</div>
            </div>
            <div style="display:flex;justify-content:space-between;margin-top:1rem;"><div><strong>${p.name}</strong><br>${p.price.toLocaleString()} ₽</div><button class="btn" style="width:auto;padding:0.6rem 1.8rem;" onclick="addToCart(${p.id});closeModal();">В корзину</button></div>
        `;
    }
    function bindZoom(){
        const img=document.getElementById('zoomImg'), lens=document.getElementById('zoomLens'), cont=document.getElementById('zoomArea');
        if(!img||!lens||!cont) return;
        img.style.cursor='crosshair'; lens.style.display='none';
        img.onmouseenter=()=>lens.style.display='block';
        img.onmouseleave=()=>{ img.style.transform='scale(1)'; lens.style.display='none'; };
        img.onmousemove=(e)=>{
            const rect=cont.getBoundingClientRect();
            let x=e.clientX-rect.left, y=e.clientY-rect.top;
            x=Math.min(Math.max(x,0),rect.width); y=Math.min(Math.max(y,0),rect.height);
            const ls=130; let lx=x-ls/2, ly=y-ls/2;
            lx=Math.min(Math.max(lx,0),rect.width-ls); ly=Math.min(Math.max(ly,0),rect.height-ls);
            lens.style.left=lx+'px'; lens.style.top=ly+'px';
            img.style.transformOrigin=`${(x/rect.width)*100}% ${(y/rect.height)*100}%`;
            img.style.transform='scale(2.2)';
        };
    }

    function renderHome(){
        const products=getProducts();
        let html='<h2 style="font-size:1.9rem;margin-bottom:1.8rem;">Коллекция</h2><div class="products-grid">';
        products.forEach(p=>{ const preview=p.frontImg||p.sideImg||p.mannequinImg||''; html+=`<div class="product-card" onclick="openModal(${JSON.stringify(p).replace(/"/g,'&quot;')})"><div class="product-image">${preview?`<img src="${preview}">`:`<span style="font-size:3rem;">${p.emoji}</span>`}</div><div class="product-info"><div class="product-name">${p.name}</div><div class="product-price">${p.price.toLocaleString()} ₽</div><div style="font-size:0.75rem;">${p.desc}</div><button class="btn" onclick="event.stopPropagation();addToCart(${p.id})">➕ Добавить</button></div></div>`; });
        html+='</div>'; return html;
    }
    
    function renderCart() {
        const cart = getCart();
        const products = getProducts();
        if (!cart.length) return '<div style="text-align:center;padding:3rem;">🛒 Корзина пуста</div>';
        let total = 0;
        let html = '<h2>Корзина</h2><div style="display:flex;flex-direction:column;gap:1rem;">';
        cart.forEach(item => {
            const p = products.find(pr => pr.id === item.id);
            if (!p) return;
            const sum = p.price * item.qty;
            total += sum;
            const img = p.frontImg || p.sideImg || p.mannequinImg;
            html += `
                <div class="cart-item" style="display:flex; gap:1rem; align-items:center; background:white; padding:1rem; border-radius:28px; flex-wrap:wrap;">
                    <div style="width:70px;height:70px;background:#f2f5f9;border-radius:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                        ${img ? `<img src="${img}" style="width:100%;height:100%;object-fit:cover;border-radius:16px;">` : p.emoji}
                    </div>
                    <div style="flex:1; min-width:120px;">
                        <div style="font-weight:700;">${p.name}</div>
                        <div style="font-size:0.9rem;">${item.qty} шт × ${p.price} ₽</div>
                    </div>
                    <div style="font-weight:600;">${sum.toLocaleString()} ₽</div>
                    <button class="btn-outline" style="padding:0.5rem 1rem; font-size:0.9rem;" onclick="removeFromCart(${p.id})">🗑️ Удалить</button>
                </div>
            `;
        });
        html += `<div style="text-align:right; font-size:1.5rem; font-weight:600; margin-top:1rem;">Итого: ${total.toLocaleString()} ₽</div>`;
        html += `<button class="btn" style="margin-top:1rem;" onclick="openOrderModal()">💳 Оформить заказ</button>`;
        return html;
    }

    let editingId = null;
    
    function renderAdmin() {
        if(!isAdminAuthenticated){ showAdminAuth(); return '<div style="text-align:center;padding:3rem;">🔒 Доступ закрыт</div>'; }
        const products = getProducts();
        let html = `<div class="admin-panel"><h2>📷 Управление товарами</h2><div id="adminMsg"></div><div id="adminForm"></div><h3 style="margin:2rem 0 1rem;">Список товаров</h3><ul style="list-style:none;">`;
        products.forEach(p => {
            html += `<li style="display:flex;justify-content:space-between;padding:0.6rem 0;border-bottom:1px solid #e9edf2;">
                        <span>${p.emoji} ${p.name} — ${p.price}₽</span>
                        <span><button onclick="editProduct(${p.id})" class="btn-outline" style="padding:0.2rem 1rem;">✏️</button> 
                        <button onclick="deleteProduct(${p.id})" class="btn-outline" style="background:#fee; padding:0.2rem 1rem;">🗑</button></span>
                     </li>`;
        });
        html += `</ul></div>`;
        return html;
    }
    
    function handleImageUpload(event, type, previewId) {
        const file = event.target.files[0];
        if (!file) return;
        if (file.size > 2 * 1024 * 1024) {
            showToast('⚠️ Файл больше 2 МБ');
            return;
        }
        const reader = new FileReader();
        reader.onload = function(e) {
            const dataUrl = e.target.result;
            if (type === 'front') document.getElementById('frontVal').value = dataUrl;
            if (type === 'side') document.getElementById('sideVal').value = dataUrl;
            if (type === 'mannequin') document.getElementById('manVal').value = dataUrl;
            const preview = document.getElementById(previewId);
            if (preview) preview.innerHTML = `<img src="${dataUrl}">`;
            showToast('✅ Фото загружено');
        };
        reader.readAsDataURL(file);
    }
    
    function renderAdminForm(product = null) {
        editingId = product?.id || null;
        const prod = product || { name: '', price: '', desc: '', frontImg: '', sideImg: '', mannequinImg: '', emoji: '👕' };
        const formDiv = document.getElementById('adminForm');
        if (!formDiv) return;
        
        formDiv.innerHTML = `
            <div><input id="prodName" placeholder="Название" value="${escapeHtml(prod.name)}" style="width:100%;padding:0.8rem;margin-bottom:0.5rem;border-radius:16px;border:1px solid #ddd;"></div>
            <div><input id="prodPrice" type="number" placeholder="Цена" value="${prod.price}" style="width:100%;padding:0.8rem;margin-bottom:0.5rem;border-radius:16px;border:1px solid #ddd;"></div>
            <div><textarea id="prodDesc" rows="2" placeholder="Описание" style="width:100%;padding:0.8rem;margin-bottom:0.5rem;border-radius:16px;border:1px solid #ddd;">${escapeHtml(prod.desc)}</textarea></div>
            <div><input id="prodEmoji" placeholder="Эмодзи" value="${prod.emoji}" style="width:100%;padding:0.8rem;margin-bottom:1rem;border-radius:16px;border:1px solid #ddd;"></div>
            
            <div class="photo-group">
                <div class="photo-label">📷 Фото 1 (спереди)</div>
                <div class="photo-preview" id="frontPreview" onclick="document.getElementById('frontFileInput').click()">
                    ${prod.frontImg ? `<img src="${prod.frontImg}">` : '📸<br>Нажмите'}
                </div>
                <input type="file" id="frontFileInput" accept="image/*" style="display:none" onchange="handleImageUpload(event, 'front', 'frontPreview')">
                <input type="hidden" id="frontVal" value="${prod.frontImg || ''}">
            </div>
            
            <div class="photo-group">
                <div class="photo-label">📷 Фото 2 (сбоку)</div>
                <div class="photo-preview" id="sidePreview" onclick="document.getElementById('sideFileInput').click()">
                    ${prod.sideImg ? `<img src="${prod.sideImg}">` : '📸<br>Нажмите'}
                </div>
                <input type="file" id="sideFileInput" accept="image/*" style="display:none" onchange="handleImageUpload(event, 'side', 'sidePreview')">
                <input type="hidden" id="sideVal" value="${prod.sideImg || ''}">
            </div>
            
            <div class="photo-group">
                <div class="photo-label">📷 Фото 3 (на манекене)</div>
                <div class="photo-preview" id="manPreview" onclick="document.getElementById('manFileInput').click()">
                    ${prod.mannequinImg ? `<img src="${prod.mannequinImg}">` : '🕴️<br>Нажмите'}
                </div>
                <input type="file" id="manFileInput" accept="image/*" style="display:none" onchange="handleImageUpload(event, 'mannequin', 'manPreview')">
                <input type="hidden" id="manVal" value="${prod.mannequinImg || ''}">
            </div>
            
            <button class="btn" style="width:auto; padding:0.8rem 2rem; margin-top:1rem;" onclick="saveProduct()">💾 Сохранить</button>
            <button class="btn-outline" style="margin-left:1rem; padding:0.8rem 2rem;" onclick="navigate('admin')">❌ Отмена</button>
        `;
        
        document.getElementById('frontVal').value = prod.frontImg || '';
        document.getElementById('sideVal').value = prod.sideImg || '';
        document.getElementById('manVal').value = prod.mannequinImg || '';
    }
    
    function saveProduct() {
        const name = document.getElementById('prodName').value.trim();
        const price = parseInt(document.getElementById('prodPrice').value);
        const desc = document.getElementById('prodDesc').value;
        const emoji = document.getElementById('prodEmoji').value;
        const frontImg = document.getElementById('frontVal').value;
        const sideImg = document.getElementById('sideVal').value;
        const mannequinImg = document.getElementById('manVal').value;
        
        if (!name || isNaN(price)) { alert('❌ Заполните название и цену'); return; }
        
        let products = getProducts();
        if (editingId) {
            products = products.map(p => p.id === editingId ? {...p, name, price, desc, emoji, frontImg, sideImg, mannequinImg} : p);
        } else {
            const newId = products.length ? Math.max(...products.map(p => p.id)) + 1 : 5;
            products.push({ id: newId, name, price, desc, emoji, frontImg, sideImg, mannequinImg });
        }
        saveProducts(products);
        document.getElementById('adminMsg').innerHTML = '<div style="background:#e0f2e9; padding:0.8rem; border-radius:16px; margin-bottom:1rem;">✓ Товар сохранён</div>';
        navigate('admin');
    }
    
    function editProduct(id) { 
        const products = getProducts(); 
        const p = products.find(pr => pr.id === id); 
        if (p) renderAdminForm(p); 
        else navigate('admin'); 
    }
    
    function deleteProduct(id) { 
        if (confirm('Удалить товар?')) { 
            let products = getProducts(); 
            products = products.filter(p => p.id !== id); 
            saveProducts(products); 
            navigate('admin'); 
        } 
    }
    
    function escapeHtml(s) { return (s || '').replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

    function navigate(page) {
        const appDiv = document.getElementById('app');
        if (page === 'home') appDiv.innerHTML = renderHome();
        else if (page === 'cart') appDiv.innerHTML = renderCart();
        else if (page === 'admin') { 
            appDiv.innerHTML = renderAdmin(); 
            if (isAdminAuthenticated) renderAdminForm(); 
        }
        updateCartCount(); 
        window.scrollTo(0,0);
    }

    const modalDiv = document.createElement('div'); 
    modalDiv.id = 'productModal'; 
    modalDiv.className = 'modal'; 
    modalDiv.innerHTML = `<div class="modal-content"><span class="close-modal" onclick="closeModal()">&times;</span><div id="modalBody"></div></div>`; 
    document.body.appendChild(modalDiv);
    
    const orderDiv = document.createElement('div'); 
    orderDiv.id = 'orderModal'; 
    orderDiv.className = 'order-modal'; 
    orderDiv.innerHTML = `
        <div class="order-modal-content">
            <span class="close-modal" onclick="closeOrderModal()">&times;</span>
            <h2>🛍️ Оформление заказа</h2>
            
            <input type="text" id="orderName" placeholder="Ваше имя *">
            <input type="tel" id="orderPhone" placeholder="Телефон *">
            <textarea id="orderAddress" rows="2" placeholder="Адрес доставки *"></textarea>
            <select id="orderDelivery">
                <option value="СДЭК">🚚 СДЭК</option>
                <option value="Почта России">📮 Почта России</option>
                <option value="Курьером">🛵 Курьер</option>
                <option value="Самовывоз">📍 Самовывоз</option>
            </select>
            
            <div class="payment-info">
                💳 <strong>Оплата переводом на карту</strong><br>
                <div class="card-number">2200 7020 0430 8479</div>
                <div style="font-size:12px;">Сбербанк · После заказа переведите сумму на карту</div>
            </div>
            
            <button class="btn" onclick="submitOrder()">✅ Оформить заказ</button>
        </div>
    `; 
    document.body.appendChild(orderDiv);
    
    const authDiv = document.createElement('div'); 
    authDiv.id = 'adminAuthModal'; 
    authDiv.className = 'admin-auth-modal'; 
    authDiv.innerHTML = `<div class="admin-auth-content"><span class="close-modal" onclick="closeAdminAuth()">&times;</span><h2>🔐 Вход в админку</h2><input type="password" id="adminPassword" placeholder="Пароль"><button class="btn" onclick="checkAdminPassword()">Войти</button></div>`; 
    document.body.appendChild(authDiv);

    window.openModal = openModal; 
    window.closeModal = closeModal; 
    window.switchAngle = switchAngle;
    window.addToCart = addToCart; 
    window.removeFromCart = removeFromCart; 
    window.navigate = navigate;
    window.openOrderModal = openOrderModal; 
    window.closeOrderModal = closeOrderModal; 
    window.submitOrder = submitOrder;
    window.editProduct = editProduct; 
    window.deleteProduct = deleteProduct; 
    window.saveProduct = saveProduct;
    window.showAdminAuth = showAdminAuth; 
    window.closeAdminAuth = closeAdminAuth; 
    window.checkAdminPassword = checkAdminPassword;
    window.handleImageUpload = handleImageUpload;

    updateCartCount(); 
    navigate('home');
</script>
</body>
</html>
